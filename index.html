<title>Copy Helper</title>

<style>
:root {
    --bg: #ffffff;
    --card: #f3f4f6;
    --border: #d1d5db;
    --text: #0f172a;
    --muted: #4b5563;
    --yellow-soft: #fde68a;
    --green-exp: #bbf7d0;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 14px;
}

/* BUILD */
.build-btn {
    width:100%;
    margin-bottom:10px;
    background:#e5e7eb;
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px;
    font-size:12px;
    cursor:pointer;
}

/* ENV */
.env-links { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.env-row { display:grid; grid-template-columns:1fr 1fr auto; gap:6px; }

.env-btn {
    padding:6px;
    border-radius:8px;
    border:1px solid var(--border);
    font-size:11px;
    cursor:pointer;
}

.yellow { background: var(--yellow-soft); }
.green { background: var(--green-exp); }

.link-btn {
    border:none;
    background:#dbeafe;
    color:#1d4ed8;
    padding:2px 6px;
    border-radius:5px;
    font-size:9.5px;
    cursor:pointer;
}

/* TOP */
.top-links {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:18px;
}

.top-btn {
    background:var(--card);
    border:1px solid var(--border);
    padding:7px;
    border-radius:10px;
    font-size:11px;
    cursor:pointer;
}

/* SECTION */
.section { margin-bottom:20px; }

.section h2 {
    font-size:11px;
    color:var(--muted);
    margin-bottom:8px;
}

/* CARDS */
.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:5px;
    display:flex;
    align-items:center;
    gap:5px;
    margin-bottom:5px;
    min-width:0;
}

.card-double {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5px;
}

.sub-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:5px;
    display:flex;
    align-items:center;
    gap:4px;
    min-width:0;
}

.input, textarea {
    flex:1;
    min-width:0;
    border:none;
    background:transparent;
    font-size:10.5px;
    outline:none;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:pre-wrap;
    resize: none;
}

.copy-btn {
    border:none;
    background:#dbeafe;
    color:#1d4ed8;
    padding:2px 5px;
    border-radius:5px;
    font-size:9px;
    cursor:pointer;
    position: relative;
}

.copy-btn.copied::after {
    content: 'Copied!';
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    background:#1d4ed8;
    color:white;
    font-size:8px;
    padding:2px 5px;
    border-radius:4px;
    opacity:1;
}

/* DEVICES */
.devices-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(60px,1fr));
    gap:6px;
}

.device-btn {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px;
    font-size:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    white-space: pre-line; /* texto visual en varias líneas */
    position: relative;
}

.device-btn.copied::after {
    content: 'Copied!';
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    background:#1d4ed8;
    color:white;
    font-size:8px;
    padding:2px 5px;
    border-radius:4px;
    opacity:1;
}
</style>
</head>

<script>
function copyText(btn, el){
    navigator.clipboard.writeText(el.value).then(()=>{
        btn.classList.add('copied');
        setTimeout(()=>btn.classList.remove('copied'),1000);
    });
}

function copyDevice(btn){
    const text = btn.getAttribute('data-copy');
    navigator.clipboard.writeText(text).then(()=>{
        btn.classList.add('copied');
        setTimeout(()=>btn.classList.remove('copied'),1000);
    });
}

function goTo(url){window.open(url,'_blank');}
</script>
